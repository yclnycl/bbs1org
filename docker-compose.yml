services:
  php:
    build: .
    restart: unless-stopped
    volumes:
      - BBS1org-data:/var/www/html/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  BBS1org-data:
