server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    location ^~ /data/ {
        deny all;
    }

    location ^~ /cache/ {
        deny all;
    }

    location = / {
        try_files /index.php =404;
    }

    location / {
        try_files $uri =404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
